[package]
name = "percolator-prog"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "lib"]
name = "percolator_prog"
path = "src/percolator.rs"

[features]
no-entrypoint = []
test-sbf = []

[dependencies]
solana-program = "1.18"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
